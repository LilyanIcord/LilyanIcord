<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco-Permis - Contact</title>
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <header class="site-header">
    <div class="site-shell header-inner">
      <div class="brand">
        <img src="image auto-école/images(1).png" alt="Logo Eco-Permis" class="logo">
        <div>
          <p class="brand-title">Auto-Ecole Eco-Permis</p>
          <p class="brand-subtitle">Contact et prise de rendez-vous</p>
        </div>
      </div>
      <button class="menu-toggle" data-menu-toggle aria-expanded="false" aria-label="Ouvrir le menu">Menu</button>
      <nav class="site-nav" data-nav>
        <ul>
          <li><a href="index.html">Accueil</a></li>
          <li><a href="formations.html">Formations</a></li>
          <li><a href="horaires.html">Horaires</a></li>
          <li><a class="active" href="contacte.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="site-shell">
    <section class="section reveal">
      <h2>Nous contacter</h2>
      <div class="contact-grid">
        <article class="panel">
          <form>
            <div class="form-row">
              <div>
                <label for="nom">Nom</label>
                <input id="nom" name="nom" type="text" placeholder="Votre nom">
              </div>
              <div>
                <label for="prenom">Prenom</label>
                <input id="prenom" name="prenom" type="text" placeholder="Votre prenom">
              </div>
            </div>
            <div class="form-row">
              <div>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="eco.permis@yahoo.com">
              </div>
              <div>
                <label for="telephone">Telephone</label>
                <input id="telephone" name="telephone" type="tel" placeholder="09 80 74 08 02">
              </div>
            </div>
            <div style="margin-bottom: 0.7rem;">
              <label for="objet">Objet</label>
              <select id="objet" name="objet">
                <option>Demande d'information</option>
                <option>Inscription</option>
                <option>Rendez-vous</option>
              </select>
            </div>
            <div style="margin-bottom: 0.9rem;">
              <label for="message">Message</label>
              <textarea id="message" name="message" placeholder="Expliquez votre besoin..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Envoyer le message</button>
          </form>
        </article>

        <aside class="panel">
          <h3 style="margin-top: 0;">Infos pratiques</h3>
          <div class="contact-visual">
            <img src="image auto-école/person-taking-driver-s-license-exam.jpg" alt="Visuel auto-ecole" class="contact-visual-image">
          </div>
          <p class="lead">
            Adresse : 9 rue Leon Blum, 80000 Amiens<br>
            Email : <a href="mailto:eco.permis@yahoo.com">eco.permis@yahoo.com</a><br>
            Telephone : <a href="tel:+33980740802">09 80 74 08 02</a>
          </p>
          <iframe
            class="map-embed"
            src="https://www.google.com/maps?q=9%20Rue%20Leon%20Blum%2C%2080000%20Amiens&output=embed"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Carte localisation Eco-Permis">
          </iframe>
        </aside>
      </div>
    </section>
  </main>

  <footer class="site-shell">Auto-Ecole Eco-Permis - Contact</footer>
  <script src="site.js"></script>
</body>
</html>
