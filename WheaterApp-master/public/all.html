<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes géolocalisations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Weatherapp</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Nouvelle localisation</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="all.html">Liste de toutes les localisations</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <h1 class="mb-4">Mes géolocalisations</h1>

        <div id="recordsContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
   
        const API_BASE_URL = 'http://localhost:3000';

        async function fetchWithFallback(urlPath, options) {
            const fallbackUrls = [`${API_BASE_URL}${urlPath}`, urlPath];
            let lastError = null;

            for (const url of fallbackUrls) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) {
                        return response;
                    }
                    lastError = new Error(`Réponse HTTP ${response.status} sur ${url}`);
                } catch (error) {
                    lastError = error;
                }
            }

            throw lastError || new Error('Impossible de contacter le serveur API.');
        }

        async function loadAllRecords() {
            try {
                const response = await fetchWithFallback('/api');
                const data = await response.json();
                if (!Array.isArray(data)) {
                    throw new Error(data?.message || 'Réponse API invalide');
                }
                displayRecords(data);
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('recordsContainer').innerHTML = `<p class="alert alert-danger">Erreur lors du chargement des données : ${error.message}</p>`;
            }
        }

        function getDefraLevel(defraIndex) {
            if (!defraIndex) return 'Non disponible';
            const index = parseInt(defraIndex);
            if (index >= 1 && index <= 3) {
                return 'Faible';
            } else if (index >= 4 && index <= 6) {
                return 'Modéré';
            } else if (index >= 7 && index <= 9) {
                return 'Élevé';
            } else if (index >= 10) {
                return 'Très élevé';
            } else {
                return 'Non disponible';
            }
        }

        function displayRecords(records) {
            const container = document.getElementById('recordsContainer');
            container.innerHTML = '';

            if (records.length === 0) {
                container.innerHTML = '<div class="alert alert-info">Aucun enregistrement trouvé.</div>';
                return;
            }

            const row = document.createElement('div');
            row.className = 'row g-4';

            records.forEach(record => {

                const col = document.createElement('div');
                col.className = 'col-md-6 col-lg-4';
                const card = document.createElement('div');
                card.className = 'card h-100 shadow-sm';

                const cardHeader = document.createElement('div');
                cardHeader.className = 'card-header bg-primary text-white';
                cardHeader.innerHTML = `<strong>${new Date(record.date).toLocaleString('fr-FR')}</strong>`;
                const cardBody = document.createElement('div');
                cardBody.className = 'card-body';

                const moodBadge = document.createElement('span');
                moodBadge.className = 'badge bg-info mb-3';
                moodBadge.textContent = `Mood: ${record.mood || 'N/A'}`;

                let content = '';
                content += `<div class="mb-2">${moodBadge.outerHTML}</div>`;
                
                if (record.city || record.country) {
                    content += `<p class="mb-2"><strong>📍 Localisation :</strong> ${record.city || 'N/A'}, ${record.country || 'N/A'}</p>`;
                }
                
                content += `<p class="mb-2"><strong>🌐 Coordonnées :</strong><br>`;
                content += `Lat: ${record.latitude || 'N/A'}<br>`;
                content += `Long: ${record.longitude || 'N/A'}</p>`;

                if (record.condition || record.temperature) {
                    content += `<hr>`;
                    content += `<p class="mb-2"><strong>🌤️ Météo :</strong></p>`;
                    if (record.condition) {
                        content += `<p class="mb-1">Condition: ${record.condition}</p>`;
                    }
                    if (record.temperature) {
                        content += `<p class="mb-1">Température: ${record.temperature}°C</p>`;
                    }
                }

                if (record.defra || record.pm25) {
                    content += `<hr>`;
                    content += `<p class="mb-2"><strong>🌬️ Qualité de l'air :</strong></p>`;
                    if (record.defra) {
                        const defraLevel = getDefraLevel(record.defra);
                        content += `<p class="mb-1">Index DEFRA: ${defraLevel} (${record.defra})</p>`;
                    }
                    if (record.pm25) {
                        content += `<p class="mb-1">PM2.5: ${record.pm25} μg/m³</p>`;
                    }
                }

                cardBody.innerHTML = content;
                card.appendChild(cardHeader);
                card.appendChild(cardBody);
                col.appendChild(card);
                row.appendChild(col);
            });

            container.appendChild(row);
        }

 
        loadAllRecords();
    </script>
</body>
</html>
